{% extends "base.html" %}

{% block title %}
    Delete course
{% endblock title %}

{% block content %}
  <div class="row">
    <div class="col-12 col-lg-6">
      <form method="post">
        {% csrf_token %}
        <div class="border rounded p-3 mb-3">
          <h2 class="mb-3">Delete "{{ object.title }}"</h2>
          <p class="mb-0">Are you sure you want to delete course "{{ object.title }}"?</p>
        </div>
        <div class="d-flex justify-content-end gap-2">
          <button type="submit" class="btn btn-danger">🗑️ Delete</button>
          <a href="{% url 'manage_course_list' %}" class="btn btn-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
{% endblock content %}

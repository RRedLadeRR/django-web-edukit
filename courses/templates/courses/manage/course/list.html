{% extends "base.html" %}

{% block title %}
    My courses
{% endblock title %}

{% block content %}
    <h2>My courses</h2>
    <div class="row">
        {% for course in object_list %}
            <h3>{{ course.title }}</h3>
            <p>
                <a href="{% url "course_edit" course.id %}">Edit course</a>
                <a href="{% url "course_delete" course.id %}">Delete course</a>
            </p>
            {% empty %}
                <p>No courses</p>
        {% endfor %}
        <p>
            <a href="{% url "course_create" %}">Create course</a>
        </p>
    </div>
{% endblock content %}

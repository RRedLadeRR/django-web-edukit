{% extends "base.html" %}

{% block title %}
    My courses
{% endblock title %}

{% block content %}
  <h2>My courses</h2>
  <div class="row">
    <div class="col">
      <ul class="list-group mb-3">
        {% for course in object_list %}
          <li class="list-group-item border-2 d-flex justify-content-between align-items-center">
            <span>📚 {{ course.title }}</span>
            <span>
              <a href="{% url 'course_edit' course.id %}" class="btn btn-sm btn-outline-primary me-1">✏️ Edit</a>
              <a href="{% url 'course_module_update' course.id %}" class="btn btn-sm btn-outline-primary me-1">📋 Edit</a>
              <a href="{% url 'course_delete' course.id %}" class="btn btn-sm btn-outline-danger">🗑️ Delete</a>
            </span>
          </li>
        {% empty %}
          <li class="list-group-item border-2 text-center text-muted">No courses</li>
        {% endfor %}
      </ul>
      <div class="text-center">
        <a href="{% url 'course_create' %}" class="btn btn-success">➕ Create new course</a>
      </div>
    </div>
  </div>
{% endblock content %}
